<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Toys</title>
  <link rel="stylesheet" href="./src/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-3xl mx-auto px-6 py-16">
    <h1 class="text-4xl font-bold text-gray-900 mb-2">Web Toys</h1>
    <p class="text-gray-500 mb-12">A collection of small web apps built on a whim</p>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
      <a href="./solitaire-cascade/"
         class="group block bg-white rounded-2xl border border-gray-100 shadow-sm p-6 hover:shadow-md transition-shadow duration-200">
        <div class="text-3xl mb-4">🃏</div>
        <h2 class="text-base font-semibold text-gray-900 mb-1 group-hover:text-blue-600 transition-colors">
          Klondike Solitaire Victory Cascade
        </h2>
        <p class="text-sm text-gray-500">
          An interactive visual effect where cards rain down on victory
        </p>
      </a>
      <a href="./ants-nest-simulator/"
         class="group block bg-white rounded-2xl border border-gray-100 shadow-sm p-6 hover:shadow-md transition-shadow duration-200">
        <div class="text-3xl mb-4">🐜</div>
        <h2 class="text-base font-semibold text-gray-900 mb-1 group-hover:text-blue-600 transition-colors">
          Ant Nest Simulator
        </h2>
        <p class="text-sm text-gray-500">
          A simulator where pheromone-driven ants autonomously dig their nest
        </p>
      </a>
    </div>
  </div>
</body>
</html>
